<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercícios JS</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        input, select, button {
            margin: 5px;
        }

        .verde {
            color: green;
        }

        .vermelho {
            color: red;
        }

        .azul {
            color: blue;
        }
    </style>
</head>
<body>

    <h1>Exercícios JavaScript</h1>

    <hr>

    <h2>1. Validador de CPF</h2>

    <input type="text" id="cpf" placeholder="Digite o CPF">
    <button onclick="validarCPF()">Validar</button>

    <p id="resCPF"></p>

    <hr>

    <h2>2. Conversor de Temperatura</h2>

    Celsius:
    <input type="number" id="celsius" step="0.1">

    Fahrenheit:
    <input type="number" id="fahrenheit" step="0.1">

    <hr>

    <h2>3. Média Escolar</h2>

    <input type="text" id="nome" placeholder="Nome do aluno">
    <br>

    <input type="number" id="n1" placeholder="Nota 1" step="0.1">
    <input type="number" id="n2" placeholder="Nota 2" step="0.1">
    <input type="number" id="n3" placeholder="Nota 3" step="0.1">

    <button onclick="calcularMedia()">Calcular</button>

    <p id="resMedia"></p>

    <hr>

    <h2>4. Taxas Infinity Bank</h2>

    <select id="bandeira">
        <option value="">Bandeira</option>
        <option value="visa">Visa</option>
        <option value="master">Master</option>
        <option value="elo">Elo</option>
    </select>

    <input type="number" id="valor" placeholder="Valor da venda" step="0.01">
    <input type="number" id="parcelas" placeholder="Parcelas">

    <button onclick="calcularTaxas()">Calcular</button>

    <p id="resTaxas"></p>

    <script>
        function validarCPF() {
            let cpf = document.getElementById("cpf").value.replace(/\D/g, "");
            let res = document.getElementById("resCPF");

            res.className = "";

            if (cpf.length != 11 || /^(\d)\1+$/.test(cpf)) {
                res.innerHTML = "CPF inválido";
                res.className = "vermelho";
                return;
            }

            let soma = 0;

            for (let i = 0; i < 9; i++) {
                soma += Number(cpf[i]) * (10 - i);
            }

            let d1 = (soma * 10) % 11;

            if (d1 == 10) {
                d1 = 0;
            }

            soma = 0;

            for (let i = 0; i < 10; i++) {
                soma += Number(cpf[i]) * (11 - i);
            }

            let d2 = (soma * 10) % 11;

            if (d2 == 10) {
                d2 = 0;
            }

            if (d1 == cpf[9] && d2 == cpf[10]) {
                res.innerHTML = "CPF válido";
                res.className = "verde";
            } else {
                res.innerHTML = "CPF inválido";
                res.className = "vermelho";
            }
        }

        document.getElementById("celsius").addEventListener("input", function() {
            let c = document.getElementById("celsius").value;

            if (c === "") {
                document.getElementById("fahrenheit").value = "";
            } else {
                document.getElementById("fahrenheit").value = ((Number(c) * 9 / 5) + 32).toFixed(2);
            }
        });

        document.getElementById("fahrenheit").addEventListener("input", function() {
            let f = document.getElementById("fahrenheit").value;

            if (f === "") {
                document.getElementById("celsius").value = "";
            } else {
                document.getElementById("celsius").value = ((Number(f) - 32) * 5 / 9).toFixed(2);
            }
        });

        function calcularMedia() {
            let nome = document.getElementById("nome").value;
            let n1 = Number(document.getElementById("n1").value);
            let n2 = Number(document.getElementById("n2").value);
            let n3 = Number(document.getElementById("n3").value);
            let res = document.getElementById("resMedia");

            res.className = "";

            let media = (n1 + n2 + n3) / 3;

            if (nome == "") {
                res.innerHTML = "Digite o nome do aluno";
                res.className = "vermelho";
            } else if (media >= 7) {
                res.innerHTML = nome + " - Média: " + media.toFixed(2) + " - Aprovado";
                res.className = "azul";
            } else if (media >= 4) {
                res.innerHTML = nome + " - Média: " + media.toFixed(2) + " - Exame. Falta " + (10 - media).toFixed(2) + " para 10";
                res.className = "verde";
            } else {
                res.innerHTML = nome + " - Média: " + media.toFixed(2) + " - Reprovado";
                res.className = "vermelho";
            }
        }

        function calcularTaxas() {
            let bandeira = document.getElementById("bandeira").value;
            let valor = Number(document.getElementById("valor").value);
            let parcelas = Number(document.getElementById("parcelas").value);
            let res = document.getElementById("resTaxas");

            res.className = "";

            let taxa = 0;

            switch (bandeira) {
                case "visa":
                    taxa = 0.02;
                    break;

                case "master":
                    taxa = 0.0185;
                    break;

                case "elo":
                    taxa = 0.03;
                    break;
            }

            if (bandeira == "" || valor <= 0 || parcelas <= 0) {
                res.innerHTML = "Preencha todos os campos";
                res.className = "vermelho";
                return;
            }

            let valorTaxa = valor * taxa;
            let juros = valor * (0.0035 * parcelas);
            let taxaMensal = 12.50 * parcelas;
            let total = valor + valorTaxa + juros + taxaMensal;
            let parcela = total / parcelas;

            res.innerHTML =
                "Taxa: R$ " + valorTaxa.toFixed(2) + "<br>" +
                "Juros: R$ " + juros.toFixed(2) + "<br>" +
                "Parcela: R$ " + parcela.toFixed(2);

            res.className = "verde";
        }
    </script>

</body>
</html>
